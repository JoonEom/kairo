<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>html,body{margin:0;padding:0}*{box-sizing:border-box}</style>
</helmet>
<div style="width:max-content;min-width:100%;min-height:100vh;box-sizing:border-box;padding:56px;background:#E8E4DC;font-family:'Inter',-apple-system,sans-serif">
  <div style="display:flex;gap:64px;align-items:flex-start">

    <div style="flex:none">
      <div style="font-size:11px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:#8C8474;margin-bottom:18px">Settings</div>
      <x-import component="IOSDevice" from="./ios-frame.jsx" hint-size="402px,874px">
        <div style="height:100%;display:flex;flex-direction:column;background:#F7F3EA">

          <!-- nav bar -->
          <div style="flex:none;padding:56px 18px 14px;display:flex;align-items:center;gap:6px;border-bottom:1px solid #ECE5D5">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="#7A7363" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <div style="font-size:17px;font-weight:600;color:#26241F">Settings</div>
          </div>

          <div style="flex:1;overflow:auto;padding:24px 20px 30px">

            <!-- notifications -->
            <div style="font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#9C9484;margin:0 4px 10px">Notifications</div>
            <div style="background:#FBF8F1;border:1px solid #E4DCC9;border-radius:14px;overflow:hidden">
              <div style="display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid #ECE5D5">
                <div><div style="font-size:15px;color:#26241F">The reveal</div><div style="font-size:12px;color:#9C9484;margin-top:2px">Thursdays at 8am</div></div>
                <div style="width:44px;height:26px;border-radius:13px;background:#26241F;padding:3px;display:flex;justify-content:flex-end"><div style="width:20px;height:20px;border-radius:50%;background:#F7F3EA"></div></div>
              </div>
              <div style="display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid #ECE5D5">
                <div><div style="font-size:15px;color:#26241F">Mid-week nudge</div><div style="font-size:12px;color:#9C9484;margin-top:2px">A reminder to capture</div></div>
                <div style="width:44px;height:26px;border-radius:13px;background:#26241F;padding:3px;display:flex;justify-content:flex-end"><div style="width:20px;height:20px;border-radius:50%;background:#F7F3EA"></div></div>
              </div>
              <div style="display:flex;align-items:center;justify-content:space-between;padding:15px 16px">
                <div><div style="font-size:15px;color:#26241F">Friend requests</div></div>
                <div style="width:44px;height:26px;border-radius:13px;background:#D8CFBC;padding:3px;display:flex;justify-content:flex-start"><div style="width:20px;height:20px;border-radius:50%;background:#FBF8F1"></div></div>
              </div>
            </div>

            <!-- account -->
            <div style="font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#9C9484;margin:26px 4px 10px">Account</div>
            <div style="background:#FBF8F1;border:1px solid #E4DCC9;border-radius:14px;overflow:hidden">
              <div style="display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid #ECE5D5"><div style="font-size:15px;color:#26241F">Sign out</div><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#C7BEAC" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
              <div style="display:flex;align-items:center;justify-content:space-between;padding:15px 16px"><div style="font-size:15px;color:#B0473A">Delete account</div><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#C7BEAC" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            </div>

            <!-- about -->
            <div style="font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#9C9484;margin:26px 4px 10px">About</div>
            <div style="background:#FBF8F1;border:1px solid #E4DCC9;border-radius:14px;overflow:hidden">
              <div style="display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid #ECE5D5"><div style="font-size:15px;color:#26241F">Privacy Policy</div><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#C7BEAC" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
              <div style="display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid #ECE5D5"><div style="font-size:15px;color:#26241F">Terms of Service</div><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#C7BEAC" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
              <div style="display:flex;align-items:center;justify-content:space-between;padding:15px 16px"><div style="font-size:15px;color:#26241F">Report a problem</div><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#C7BEAC" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            </div>

            <div style="text-align:center;font-size:12px;color:#B5AD9C;margin-top:30px">Kairo · v1.0</div>

          </div>
        </div>
      </x-import>
    </div>

  </div>
</div>
</x-dc>
</body>
</html>
