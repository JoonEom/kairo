<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="./image-slot.js"></script>
</helmet>
<div style="width:100%;font-family:'Inter',-apple-system,sans-serif">
  <div style="position:relative;width:100%;aspect-ratio:1.31;border-radius:14px;box-shadow:0 6px 20px rgba(38,36,31,0.10);perspective:1600px">
    <div ref="{{ cardRef }}" style="position:absolute;inset:0;transform-style:preserve-3d;-webkit-transform-style:preserve-3d;transition:transform 0.62s cubic-bezier(0.2,0.72,0.16,1);transform:rotateY(0deg)">

      <!-- FRONT -->
      <div ref="{{ frontRef }}" style="position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:14px;background:#FFFFFF;padding:3.1%;box-sizing:border-box;overflow:hidden">
        <div style="position:relative;width:100%;height:100%;border-radius:8px;overflow:hidden;background:#EFE9DC">
          <image-slot id="{{ photoId }}" style="width:100%;height:100%;display:block" shape="rect" placeholder="{{ photoPlaceholder }}"></image-slot>
          <sc-if value="{{ hasLocation }}" hint-placeholder-val="{{ true }}">
            <div style="position:absolute;left:13px;bottom:12px;color:#FFFFFF;font-size:13px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;text-shadow:0 1px 4px rgba(0,0,0,0.5);pointer-events:none">{{ location }}</div>
          </sc-if>
          <div onClick="{{ onFlip }}" style="position:absolute;right:10px;bottom:10px;width:30px;height:30px;border-radius:50%;background:rgba(251,248,241,0.94);border:1px solid #E4DCC9;display:flex;align-items:center;justify-content:center;color:#7A7363;font-size:15px;cursor:pointer;box-shadow:0 1px 4px rgba(38,36,31,0.12)">⤺</div>
        </div>
      </div>

      <!-- BACK -->
      <div ref="{{ backRef }}" onClick="{{ onBackClick }}" style="position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;transform:rotateY(180deg);border-radius:14px;background:#FBF8F1;border:1px solid #EDE6D6;padding:6.4% 6%;box-sizing:border-box;display:flex;cursor:pointer;pointer-events:none">
        <div style="flex:1.5;display:flex;flex-direction:column;justify-content:flex-start;padding-right:4%">
          <sc-if value="{{ hasCaption }}" hint-placeholder-val="{{ true }}">
            <div style="font-family:'Fraunces',Georgia,serif;font-weight:400;font-size:19px;line-height:1.5;color:#26241F;text-wrap:pretty">{{ caption }}</div>
          </sc-if>
          <sc-if value="{{ noCaption }}" hint-placeholder-val="{{ true }}">
            <div style="font-family:'Fraunces',Georgia,serif;font-style:italic;font-size:16px;line-height:1.5;color:#B5AD9C">No caption</div>
          </sc-if>
        </div>

        <div style="width:1px;background:#E4DCC9;margin:2px 0"></div>

        <div style="width:38%;display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;padding-left:6%">
          <div style="position:relative;align-self:flex-end">
            <div style="width:46px;height:56px;background:#FFFFFF;border:1px solid #E4DCC9;border-radius:3px;box-shadow:0 1px 3px rgba(38,36,31,0.08);display:flex;align-items:center;justify-content:center;transform:rotate(3deg)">
              <div style="width:36px;height:46px;border:1px dashed #D8CFBC;border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',Georgia,serif;font-style:italic;font-size:20px;color:#9C9484">K</div>
            </div>
            <div style="position:absolute;left:-22px;bottom:-12px;width:54px;height:54px;border-radius:50%;border:1.5px solid rgba(156,148,132,0.35);display:flex;align-items:center;justify-content:center;transform:rotate(-9deg);pointer-events:none">
              <div style="font-size:6.5px;font-weight:600;letter-spacing:0.1em;color:rgba(156,148,132,0.6);text-transform:uppercase;text-align:center;line-height:1.5">Kairo<br>· post ·</div>
            </div>
          </div>
          <div style="text-align:right">
            <sc-if value="{{ hasLocation }}" hint-placeholder-val="{{ true }}">
              <div style="font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#9C9484;margin-bottom:5px">{{ location }}</div>
            </sc-if>
            <div style="font-size:12px;color:#7A7363;letter-spacing:0.01em">{{ date }}</div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:460,&quot;height&quot;:352},&quot;photoId&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;pc-photo&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;caption&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;We took the long way home and the light did this.&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;location&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Discovery Park, Seattle&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;date&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;March 12, 2026&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;photoPlaceholder&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Drop a photo&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { flipped: false };
  cardRef = React.createRef();
  frontRef = React.createRef();
  backRef = React.createRef();
  componentDidMount() { this._applyFlip(); }
  componentDidUpdate() { this._applyFlip(); }
  _applyFlip() {
    const flipped = this.state.flipped;
    if (this.cardRef.current) this.cardRef.current.style.transform = flipped ? 'rotateY(180deg)' : 'rotateY(0deg)';
    if (this.frontRef.current) this.frontRef.current.style.pointerEvents = flipped ? 'none' : 'auto';
    if (this.backRef.current) this.backRef.current.style.pointerEvents = flipped ? 'auto' : 'none';
  }
  renderVals() {
    const p = this.props || {};
    const caption = p.caption || '';
    const location = p.location || '';
    return {
      photoId: p.photoId || 'pc-photo',
      photoPlaceholder: p.photoPlaceholder || 'Drop a photo',
      location,
      caption,
      date: p.date || '',
      hasLocation: !!location,
      hasCaption: !!caption,
      noCaption: !caption,
      cardRef: this.cardRef,
      frontRef: this.frontRef,
      backRef: this.backRef,
      onFlip: (e) => { if (e) { e.stopPropagation(); e.preventDefault(); } this.setState({ flipped: true }); },
      onBackClick: () => this.setState({ flipped: false })
    };
  }
}
</script>
</body>
</html>
